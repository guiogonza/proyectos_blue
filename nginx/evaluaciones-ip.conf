# Acceso por IP pública - servidor principal 164.68.118.86

server {
    listen 80;
    server_name 164.68.118.86;

    client_max_body_size 50M;

    # Redirigir raíz al prefijo de la aplicación
    location = / {
        return 302 /evaluacionesrh/;
    }

    # Normalizar /evaluacionesrh sin slash final
    location = /evaluacionesrh {
        return 301 /evaluacionesrh/;
    }

    # ── evaluacionesrh ────────────────────────────────────────────────────────
    location /evaluacionesrh/ {
        rewrite ^/evaluacionesrh/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8505;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location ~ ^/(_stcore|static|media|component)(/.*)?$ {
        proxy_pass http://127.0.0.1:8505;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ── Colombia · fix _stcore en subpáginas (ej: /colombia/Login/_stcore/health)
    location ~ ^/colombia/.+/(_stcore|static|media|component)(/.*)?$ {
        rewrite ^(/colombia)/[^/]+(/(_stcore|static|media|component).*)$ $1$2 break;
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ── Colombia · Dashboard (Streamlit) ─────────────────────────────────────
    location /colombia {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ── Colombia · API (FastAPI) ──────────────────────────────────────────────
    location /colombia-api {
        proxy_pass http://127.0.0.1:8502;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }

    # ── Peru · fix _stcore en subpáginas (ej: /peru/Login/_stcore/health)
    location ~ ^/peru/.+/(_stcore|static|media|component)(/.*)?$ {
        rewrite ^(/peru)/[^/]+(/(_stcore|static|media|component).*)$ $1$2 break;
        proxy_pass http://127.0.0.1:8510;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ── Peru · Dashboard (Streamlit) ─────────────────────────────────────────
    location /peru {
        proxy_pass http://127.0.0.1:8510;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ── Peru · API (FastAPI) ──────────────────────────────────────────────────
    location /peru-api {
        proxy_pass http://127.0.0.1:8511;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }
}
