##############################################################
# Nginx — Project Ops (Multi-País)
# Servidor: 164.68.118.86
#
# Despliegue:
#   sudo cp /root/project-ops/nginx/project-ops.conf /etc/nginx/sites-available/project-ops
#   sudo ln -sf /etc/nginx/sites-available/project-ops /etc/nginx/sites-enabled/project-ops
#   sudo nginx -t && sudo systemctl reload nginx
##############################################################

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── Colombia · Dashboard (Streamlit) ─────────────────────
    location /colombia {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket (requerido por Streamlit)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }

    # ── Colombia · API (FastAPI) ──────────────────────────────
    location /colombia-api {
        proxy_pass         http://127.0.0.1:8502;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout  120;
        proxy_send_timeout  120;
    }

    # ── Perú · Dashboard (Streamlit) ─────────────────────────
    location /peru {
        proxy_pass         http://127.0.0.1:8510;
        proxy_http_version 1.1;

        # WebSocket (requerido por Streamlit)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }

    # ── Perú · API (FastAPI) ──────────────────────────────────
    location /peru-api {
        proxy_pass         http://127.0.0.1:8511;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout  120;
        proxy_send_timeout  120;
    }
}
